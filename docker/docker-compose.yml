version: "3"

services:
  namenode:
    image: apache/hadoop:3
    hostname: namenode
    container_name: namenode
    user: root
    environment:
      - ENSURE_NAMENODE_DIR=/tmp/hadoop-root/dfs/name
      - HADOOP_HOME=/opt/hadoop
    env_file:
      - ./config/hadoop.env
    ports:
      - "9870:9870"   # NameNode Web UI
      - "9000:9000"   # HDFS
      - "8088:8088"   # YARN ResourceManager
    volumes:
      - namenode_data:/tmp/hadoop-root/dfs/name
      - ./config:/opt/hadoop/etc/hadoop
    command: ["hdfs", "namenode"]
    networks:
      - hadoop_network

  datanode1:
    image: apache/hadoop:3
    hostname: datanode1
    container_name: datanode1
    user: root
    env_file:
      - ./config/hadoop.env
    ports:
      - "9864:9864"   # DataNode Web UI
    volumes:
      - datanode1_data:/tmp/hadoop-root/dfs/data
      - ./config:/opt/hadoop/etc/hadoop
    command: ["hdfs", "datanode"]
    depends_on:
      - namenode
    networks:
      - hadoop_network

  datanode2:
    image: apache/hadoop:3
    hostname: datanode2
    container_name: datanode2
    user: root
    env_file:
      - ./config/hadoop.env
    ports:
      - "9865:9864"   # DataNode Web UI
    volumes:
      - datanode2_data:/tmp/hadoop-root/dfs/data
      - ./config:/opt/hadoop/etc/hadoop
    command: ["hdfs", "datanode"]
    depends_on:
      - namenode
    networks:
      - hadoop_network

  resourcemanager:
    image: apache/hadoop:3
    hostname: resourcemanager
    container_name: resourcemanager
    user: root
    env_file:
      - ./config/hadoop.env
    ports:
      - "8089:8088"
    volumes:
      - ./config:/opt/hadoop/etc/hadoop
    command: ["yarn", "resourcemanager"]
    depends_on:
      - namenode
    networks:
      - hadoop_network

  nodemanager:
    image: apache/hadoop:3
    hostname: nodemanager
    container_name: nodemanager
    user: root
    env_file:
      - ./config/hadoop.env
    volumes:
      - ./config:/opt/hadoop/etc/hadoop
    command: ["yarn", "nodemanager"]
    depends_on:
      - resourcemanager
    networks:
      - hadoop_network

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:

networks:
  hadoop_network:
    driver: bridge
